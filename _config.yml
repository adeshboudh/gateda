title: GATE DA Notes
description: >-
  Probability & Statistics, Programming & DSA, Machine Learning, Databases,
  Linear Algebra, Artificial Intelligence, Calculus & Optimization.
remote_theme: just-the-docs/just-the-docs@v0.10.1
plugins:
  - jekyll-remote-theme

# Math: let MathJax handle TeX; kramdown must NOT pre-render it.
kramdown:
  math_engine: null
  syntax_highlighter: rouge

search_enabled: true
heading_anchors: true

# remote_theme does not import the theme's _config defaults, so set layout here
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Collapsible module groups in the sidebar
nav_external_links: []

aux_links:
  "View on GitHub":
    - "https://github.com/adeshboudh/gateda"
aux_links_new_tab: true

color_scheme: dark

# Files/dirs Jekyll should ignore
exclude:
  - docs/GATE_DA_2027_roadmap.md
  - _build_site.py
  - Gemfile
  - Gemfile.lock
  - vendor
  - .obsidian
  - .codeboarding
  - README.md
  - latex-rendering-test-bayes-distributions.md
  - agent-gate-da-mentor.json
