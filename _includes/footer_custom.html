<!-- Right-side "On this page" heading navigation, built from the page's h2/h3 -->
<script>
(function () {
  function build() {
    var content = document.querySelector('#main-content');
    var main = document.querySelector('.main');
    if (!content || !main) return;

    var heads = content.querySelectorAll('h2[id], h3[id]');
    if (heads.length < 2) return;   // skip thin pages

    var nav = document.createElement('nav');
    nav.id = 'toc-nav';
    nav.setAttribute('aria-label', 'On this page');

    var title = document.createElement('div');
    title.className = 'toc-title';
    title.textContent = 'On this page';
    nav.appendChild(title);

    var ul = document.createElement('ul');
    ul.className = 'toc-list';

    var byId = {};
    heads.forEach(function (el) {
      var li = document.createElement('li');
      li.className = 'toc-item toc-' + el.tagName.toLowerCase();
      var a = document.createElement('a');
      a.href = '#' + el.id;
      a.textContent = el.textContent.replace(/¶/g, '').trim();
      li.appendChild(a);
      ul.appendChild(li);
      byId[el.id] = a;
    });

    nav.appendChild(ul);
    main.appendChild(nav);

    // Scrollspy: highlight the section currently in view
    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            Object.keys(byId).forEach(function (k) { byId[k].classList.remove('active'); });
            if (byId[e.target.id]) byId[e.target.id].classList.add('active');
          }
        });
      }, { rootMargin: '0px 0px -75% 0px', threshold: 0 });
      heads.forEach(function (el) { obs.observe(el); });
    }
  }

  if (document.readyState !== 'loading') build();
  else document.addEventListener('DOMContentLoaded', build);
})();
</script>
